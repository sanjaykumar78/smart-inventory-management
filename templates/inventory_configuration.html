{% extends 'base.html' %}

{% block content %}
<h3>Inventory Configuration</h3>
<form method="post">
  <div class="row g-3">
    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-body">
          <h6>Inventory Rules</h6>
          <div class="mb-3">
            <label class="form-label">Low Stock Threshold</label>
            <input name="low_stock_threshold" type="number" class="form-control" value="{{ config.low_stock_threshold }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Critical Stock Threshold</label>
            <input name="critical_stock_threshold" type="number" class="form-control" value="{{ config.critical_stock_threshold }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Default Reorder Quantity</label>
            <input name="default_reorder_quantity" type="number" class="form-control" value="{{ config.default_reorder_quantity }}">
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6>Forecast Settings</h6>
          <div class="mb-3">
            <label class="form-label">Forecast Period (months)</label>
            <input name="forecast_period_months" type="number" class="form-control" value="{{ config.forecast_period_months }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Forecast Frequency</label>
            <select name="forecast_frequency" class="form-select">
              <option value="daily" {% if config.forecast_frequency == 'daily' %}selected{% endif %}>Daily</option>
              <option value="weekly" {% if config.forecast_frequency == 'weekly' %}selected{% endif %}>Weekly</option>
              <option value="monthly" {% if config.forecast_frequency == 'monthly' %}selected{% endif %}>Monthly</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Model Status</label>
            <input class="form-control" value="{{ config.model_status }}" disabled>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card mb-3">
        <div class="card-body">
          <h6>Alert Settings</h6>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="alert_low_stock" id="alert_low_stock" {% if config.alert_low_stock %}checked{% endif %}>
            <label class="form-check-label" for="alert_low_stock">Low Stock Alerts</label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="alert_reorder_suggestions" id="alert_reorder_suggestions" {% if config.alert_reorder_suggestions %}checked{% endif %}>
            <label class="form-check-label" for="alert_reorder_suggestions">Reorder Suggestions</label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="alert_demand_spike" id="alert_demand_spike" {% if config.alert_demand_spike %}checked{% endif %}>
            <label class="form-check-label" for="alert_demand_spike">Demand Spike Alerts</label>
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body">
          <h6>Business Configuration</h6>
          <div class="mb-3">
            <label class="form-label">Currency</label>
            <input name="currency" class="form-control" value="{{ config.currency }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Warehouse Location</label>
            <input name="warehouse_location" class="form-control" value="{{ config.warehouse_location }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Default Category</label>
            <input name="default_category" class="form-control" value="{{ config.default_category }}">
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end">
        <button class="btn btn-primary">Save Configuration</button>
      </div>
    </div>
  </div>
</form>

{% endblock %}
